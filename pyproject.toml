[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "oprim"
dynamic = ["version"]
description = "Atomic operations library — Layer 1 meta-primitives for financial analysis"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Wiki" }]
dependencies = [
    "numpy>=1.26.0",
    "scipy>=1.12.0",
    "pandas>=2.2.0",
    "scikit-learn>=1.4.0",
    "statsmodels>=0.14.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "pytest-benchmark>=4.0.0",
    "ruff>=0.4.0",
]

[tool.hatch.version]
path = "oprim/_version.py"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers -v"
markers = [
    "academic_reference: test verifies against published academic/RFC/FIPS reference vectors",
]

[tool.coverage.run]
source = ["oprim"]
branch = true

[tool.coverage.report]
fail_under = 75
show_missing = true
